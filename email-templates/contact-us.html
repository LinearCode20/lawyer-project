<!DOCTYPE html>
<html>
  <body style="margin:0; padding:0; background-color:#f5f5f5; font-family: Arial, sans-serif;">

    <table width="100%" cellpadding="0" cellspacing="0" style="background-color:#f5f5f5; padding:20px;">
      <tr>
        <td align="center">

          <!-- Container -->
          <table width="600" cellpadding="0" cellspacing="0" style="background:#ffffff; border-radius:8px; padding:20px;">

            <!-- Header -->
            <tr>
              <td style="padding-bottom:20px; border-bottom:1px solid #e5e5e5;">
                <h1 style="margin:0; font-size:24px; color:#1a2a44;">LAW EDGE</h1>
                <p style="margin:5px 0 0; color:#777;">Professional CPD</p>
              </td>
            </tr>

            <!-- Title -->
            <tr>
              <td style="padding:20px 0;">
                <h2 style="margin:0; font-size:20px; color:#1a2a44;">New Contact Request</h2>
              </td>
            </tr>

            <!-- Card Style Content -->
            <tr>
              <td>
                <table width="100%" cellpadding="0" cellspacing="0" style="border:1px solid #e0e0e0; border-radius:8px; padding:20px;">
                  
                  <tr>
                    <td style="padding-bottom:10px;">
                      <strong style="color:#333;">Name:</strong><br/>
                      <span style="color:#555;">{{CONTACT_US_NAME}}</span>
                    </td>
                  </tr>

                  <tr>
                    <td style="padding-bottom:10px;">
                      <strong style="color:#333;">Email:</strong><br/>
                      <span style="color:#555;">{{CONTACT_US_EMAIL}}</span>
                    </td>
                  </tr>

                  <tr>
                    <td style="padding-bottom:10px;">
                      <strong style="color:#333;">Message:</strong><br/>
                      <span style="color:#555;">{{CONTACT_US_MESSAGE}}</span>
                    </td>
                  </tr>

                </table>
              </td>
            </tr>

            <!-- Divider -->
            <tr>
              <td style="padding:20px 0;">
                <hr style="border:none; border-top:1px solid #e5e5e5;" />
              </td>
            </tr>

            <!-- Footer -->
            <tr>
              <td style="font-size:12px; color:#777;">
                <p style="margin:0 0 10px;">
                  Law Edge CPD is a trading style name for Estates and Wills Advisory Group Limited.
                </p>

                <p style="margin:0 0 10px;">
                  This email was generated from your website contact form.
                </p>

                <p style="margin:0;">
                  © Law Edge
                </p>
              </td>
            </tr>

          </table>
        </td>
      </tr>
    </table>

  </body>
</html>
